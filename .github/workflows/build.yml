name: Build
on: [ pull_request, push, workflow_dispatch ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
      - name: Install Node packages
        run: npm ci --prefix website
      - name: Build Angular
        run: npm run build --prefix website
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
          cache: gradle
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build JAR
        run: ./gradlew build --no-daemon
      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@main
        with:
          name: Artifact
          path: build/libs/Hong-Kong-Transport-Data.jar
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/master'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        if: github.ref == 'refs/heads/master'
        run: |
          IMAGE_NAME=ghcr.io/jonafanho/hong-kong-transport-data:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
